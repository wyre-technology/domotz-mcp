# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - domotzApiKey
    properties:
      domotzApiKey:
        type: string
        description: Your Domotz API key
      domotzRegion:
        type: string
        description: "Your Domotz region (e.g., us, eu)"
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { DOMOTZ_API_KEY: config.domotzApiKey, DOMOTZ_REGION: config.domotzRegion || '', MCP_TRANSPORT: 'stdio' } })
