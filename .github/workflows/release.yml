name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_info.outputs.version }}
      released: ${{ steps.release_info.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get release info
        id: release_info
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          # Strip leading "v" so downstream consumers (docker tag, server.json identifier)
          # don't double-prefix to vvX.Y.Z.
          VERSION="${VERSION#v}"
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            BODY=$(gh release view "$VERSION" --json body --jq '.body' 2>/dev/null || echo "")
            SUMMARY=$(echo "$BODY" | sed '1,2d' | head -30 | cut -c1-1800)
            {
              echo "summary<<RELEASE_EOF"
              echo "$SUMMARY"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Discord release notification
        if: false  # disabled - too noisy, re-enable later
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "New Release: ${{ steps.release_info.outputs.version }}"
          description: |
            **${{ github.repository }}** — [${{ steps.release_info.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_info.outputs.version }})

            ${{ steps.release_info.outputs.summary }}
          color: 0x57F287

  docker:
    needs: [release]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && !failure()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Resolve release version
        id: version
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            echo "ERROR: needs.release.outputs.version is empty" >&2
            exit 1
          fi
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.released == 'true'
    permissions:
      id-token: write
      contents: read
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
      - name: Stamp version into server.json
        run: |
          jq --arg v "$VERSION" \
            '.version = $v | .packages[0].identifier = "ghcr.io/wyre-technology/domotz-mcp:v" + $v' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json
      - name: Validate server.json
        run: ./mcp-publisher validate
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
      - name: Verify registry listing
        run: |
          sleep 5
          curl -sf "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.wyre-technology/domotz-mcp" \
            | jq '.servers[]?.server | {name, version}'
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          echo "Deploying $IMAGE to mcpgw-prod-domotz (revision tag sha-${SHORT_SHA}-${GITHUB_RUN_ID})"
          az containerapp update \
            --name mcpgw-prod-domotz \
            --resource-group mcp-gateway-prod \
            --image "$IMAGE" \
            --set-env-vars "IMAGE_VERSION=sha-${SHORT_SHA}-${GITHUB_RUN_ID}"