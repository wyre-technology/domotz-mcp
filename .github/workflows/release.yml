name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get release info
        id: release_info
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            BODY=$(gh release view "$VERSION" --json body --jq '.body' 2>/dev/null || echo "")
            SUMMARY=$(echo "$BODY" | sed '1,2d' | head -30 | cut -c1-1800)
            {
              echo "summary<<RELEASE_EOF"
              echo "$SUMMARY"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Discord release notification
        if: steps.release_info.outputs.released == 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: "New Release: ${{ steps.release_info.outputs.version }}"
          description: |
            **${{ github.repository }}** — [${{ steps.release_info.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_info.outputs.version }})

            ${{ steps.release_info.outputs.summary }}
          color: 0x57F287

  docker:
    needs: release
    runs-on: ubuntu-latest
    if: always() && !cancelled() && !failure()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
